<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveStream Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #d1d5db;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      document.body.innerHTML = '<div style="color:red; font-size: 20px; padding: 20px; font-family: sans-serif;"><h1>Startup Error</h1><p>' + msg + '</p><p>' + url + ':' + line + ':' + col + '</p><pre>' + (error ? error.stack : '') + '</pre></div>';
    };
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML = '<div style="color:red; font-size: 20px; padding: 20px; font-family: sans-serif;"><h1>Unhandled Promise Rejection</h1><p>' + event.reason + '</p></div>';
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
